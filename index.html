<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnixApp — Terms of Use</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0b0b0d; --bg2:#15151b; --card:rgba(255,255,255,.05); --border:rgba(255,255,255,.10);
    --txt:#ececf1; --dim:#9a9aa6; --accent:#ffffff; --discord:#5865F2; --discord2:#6c79ff;
    --ok:#43b581;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; color:var(--txt);
    font-family:'Poppins',system-ui,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1d1d27,transparent),
               linear-gradient(160deg,var(--bg1),var(--bg2));
    display:flex; align-items:center; justify-content:center; padding:28px;
  }
  .frame{
    width:100%; max-width:860px; padding:30px 30px 26px; border-radius:18px;
    background:var(--card); border:1px solid var(--border); backdrop-filter:blur(14px);
    box-shadow:0 24px 60px rgba(0,0,0,.45); animation:rise .6s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .header{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap}
  .brand{display:flex; align-items:center; gap:14px}
  .brand img{width:46px; height:46px; border-radius:10px}
  .brand .t1{font-weight:600; font-size:20px; line-height:1.1}
  .brand .t1 .snix{font-family:'Playfair Display',serif; font-size:23px}
  .brand .t2{color:var(--dim); font-size:12.5px}
  .lang{
    cursor:pointer; user-select:none; font-size:13px; font-weight:500; color:var(--txt);
    border:1px solid var(--border); border-radius:999px; padding:7px 13px; transition:.25s;
    background:rgba(255,255,255,.03);
  }
  .lang:hover{transform:scale(1.05); border-color:var(--discord)}
  h2.title{font-size:17px; margin:24px 0 6px}
  .updated{color:var(--dim); font-size:12px; margin-bottom:10px}
  .content{
    white-space:pre-wrap; font-size:13.5px; line-height:1.6; color:#d9d9e2;
    max-height:46vh; overflow:auto; padding:16px 18px; border-radius:12px;
    background:rgba(0,0,0,.22); border:1px solid var(--border);
  }
  .content::-webkit-scrollbar{width:10px}
  .content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14); border-radius:8px}
  .acceptBtn{
    margin-top:20px; width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer;
    font-family:inherit; font-size:15.5px; font-weight:600; color:#fff;
    background:linear-gradient(135deg,var(--discord),#7a52ff); transition:.3s;
    box-shadow:0 10px 24px rgba(88,101,242,.28);
  }
  .acceptBtn:hover{transform:translateY(-1px) scale(1.01); filter:brightness(1.06)}
  .acceptBtn.done{background:#2f3136; color:var(--ok); cursor:default; box-shadow:none; transform:none}
  /* zone Discord (cachee tant qu'on n'a pas accepte) */
  #discordZone{
    margin-top:18px; max-height:0; opacity:0; overflow:hidden;
    transition:max-height .5s ease, opacity .5s ease;
  }
  #discordZone.show{max-height:320px; opacity:1}
  .dz-inner{
    border-top:1px dashed var(--border); padding-top:18px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .dz-inner p{color:var(--dim); font-size:13.5px; margin:0}
  .connect-title{ color:var(--txt); font-weight:600; font-size:17px; margin:0 0 4px; }
  .discordBtn{
    display:inline-flex; align-items:center; justify-content:center; gap:10px; text-decoration:none;
    background:var(--discord); color:#fff; font-weight:600; font-size:15px;
    width:280px; padding:13px 22px; border-radius:12px; transition:.25s;
    box-shadow:0 10px 24px rgba(88,101,242,.30);
  }
  .discordBtn:hover{background:var(--discord2); transform:translateY(-1px) scale(1.02)}
  .discordBtn .dlogo{height:18px; width:auto; filter:drop-shadow(0 2px 3px rgba(0,0,0,.45))}
  .googleBtn{
    display:inline-flex; align-items:center; justify-content:center; gap:12px; text-decoration:none;
    background:#fff; color:#1f1f1f; font-weight:600; font-size:15px;
    width:280px; padding:12px 22px; border-radius:12px; border:1px solid #dadce0; transition:.25s;
    box-shadow:0 8px 22px rgba(0,0,0,.22);
  }
  .googleBtn:hover{transform:translateY(-1px) scale(1.02); box-shadow:0 10px 26px rgba(0,0,0,.30)}
  .googleBtn .gicon{width:20px; height:20px; flex:0 0 20px}
  .foot{margin-top:16px; text-align:center; color:var(--dim); font-size:11.5px}
  a.link{color:var(--discord2); text-decoration:none}
</style>
</head>
